version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: dispatch-orders-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-dispatch_orders}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"  # Puerto externo 5433 -> interno 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-dispatch_orders}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dispatch-network

  # Servicio API (se construirá después)
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dispatch-orders-api
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432  # Dentro del contenedor sigue siendo 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-dispatch_orders}
      DB_SSLMODE: disable
      SERVER_PORT: ${SERVER_PORT:-8080}
      ENV: ${ENV:-development}
    ports:
      - "${SERVER_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dispatch-network
    profiles:
      - full

volumes:
  postgres_data:
    driver: local

networks:
  dispatch-network:
    driver: bridge